name: Docker Image chess

on:
  push:
    branches: ["main"]

jobs:
  publish_images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.chess }}

      - name: Build Docker image
        run: docker build . -t gowshik79/my_app:latest

      - name: Push Docker image
        run: docker push gowshik79/my_app:latest
